<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prioriza Territorio - Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f7fa;
  margin: 0;
  padding: 20px;
}

.header {
  background: #2f5d7c;
  color: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.grid-2 {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 15px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.primary {
  background: #2f5d7c;
  color: white;
}

.secondary {
  background: #ddd;
}

#map {
  height: 300px;
  border-radius: 10px;
}

.bar {
  height: 10px;
  background: #2f5d7c;
  border-radius: 5px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}
</style>
</head>

<body>

<div class="header">
  <h1>Prioriza Territorio</h1>
  <p>Dashboard de priorización territorial para inversiones</p>
</div>

<button class="primary" onclick="cargarDashboard()">Cargar dashboard</button>
<button class="secondary" onclick="cargarDashboard()">Actualizar</button>

<p id="estado"></p>

<div class="grid">
  <div class="card"><b>Total sitios</b><div id="total"></div></div>
  <div class="card"><b>Prioridad alta</b><div id="alta"></div></div>
  <div class="card"><b>Prioridad media</b><div id="media"></div></div>
  <div class="card"><b>Promedio general</b><div id="promedio"></div></div>
</div>

<div class="grid-2">

  <div class="card">
    <h3>Mapa de sitios</h3>
    <div id="map"></div>
  </div>

  <div class="card">
    <h3>Resumen ejecutivo</h3>
    <p id="resumen"></p>

    <h3>Promedio por sitio</h3>
    <div id="barras"></div>

    <!-- NUEVO BLOQUE -->
    <h3>Recomendación estratégica</h3>
    <p id="recomendacion"></p>
  </div>

</div>

<div class="card">
  <h3>Ranking territorial</h3>
  <table border="1" width="100%" id="tabla"></table>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let mapa;

async function cargarDashboard() {

  const estado = document.getElementById("estado");

  try {

    const res = await fetch("/api/resultados");
    const data = await res.json();

    const registros = data;

    // métricas
    document.getElementById("total").innerText = registros.length;
    document.getElementById("alta").innerText = registros.filter(r => r.promedio >= 4).length;
    document.getElementById("media").innerText = registros.filter(r => r.promedio >= 2 && r.promedio < 4).length;
    document.getElementById("promedio").innerText =
      (registros.reduce((a,b)=>a+b.promedio,0)/registros.length).toFixed(2);

    // resumen
    const ordenados = [...registros].sort((a,b)=>b.promedio-a.promedio);
    document.getElementById("resumen").innerText =
      `Mejor evaluado: ${ordenados[0].sitio} | Peor evaluado: ${ordenados[ordenados.length-1].sitio}`;

    // barras
    const barras = document.getElementById("barras");
    barras.innerHTML = "";
    registros.forEach(r=>{
      barras.innerHTML += `
        <div class="row">
          <span>${r.sitio}</span>
          <span>${r.promedio}</span>
        </div>
        <div class="bar" style="width:${r.promedio*20}%"></div>
      `;
    });

    // mapa
    if(!mapa){
      mapa = L.map("map").setView([14.9, -91.3], 9);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(mapa);
    }

    mapa.eachLayer(l=>{
      if(l instanceof L.Marker) mapa.removeLayer(l);
    });

    registros.forEach(r=>{
      if(r.lat && r.lon){
        L.marker([r.lat, r.lon])
          .addTo(mapa)
          .bindPopup(`<b>${r.sitio}</b><br>${r.comunidad}`);
      }
    });

    // tabla
    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "<tr><th>Sitio</th><th>Promedio</th><th>Comunidad</th></tr>";
    registros.forEach(r=>{
      tabla.innerHTML += `<tr><td>${r.sitio}</td><td>${r.promedio}</td><td>${r.comunidad}</td></tr>`;
    });

    // 🔥 RECOMENDACIÓN (YA CORRECTA)
    const mejor = ordenados[0];
    const peor = ordenados[ordenados.length - 1];

    document.getElementById("recomendacion").innerText =
      `Se recomienda priorizar intervenciones en ${mejor.sitio}, ` +
      `que presenta el mayor potencial (${mejor.promedio}). ` +
      `Asimismo, ${peor.sitio} requiere mejoras en infraestructura y servicios ` +
      `para elevar su viabilidad territorial.`;

    estado.innerText = `Se cargaron ${registros.length} registros`;

  } catch (e) {
    estado.innerText = "Error: " + e.message;
  }
}

</script>

</body>
</html>
