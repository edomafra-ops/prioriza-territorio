<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Prioriza Territorio</title>
</head>
<body>
<h2>Resultados D1</h2>
<button onclick="cargar()">Cargar resultados</button>
<pre id="out"></pre>

<script>
const API = "/api/resultados";

async function cargar(){
  const res = await fetch(API);
  const data = await res.json();
  document.getElementById("out").textContent = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
