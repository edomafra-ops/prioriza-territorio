<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prioriza Territorio - Dashboard</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    :root {
      --primary: #1f4e78;
      --primary-soft: #dbe8f4;
      --border: #cfd8df;
      --bg: #f4f7fa;
      --card: #ffffff;
      --text: #24313a;
      --good: #dff0d8;
      --mid: #fff3cd;
      --bad: #f8d7da;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1280px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }

    .header {
      background: linear-gradient(135deg, #1f4e78, #2d6b97);
      color: white;
      border-radius: 16px;
      padding: 24px 26px;
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 6px 0;
      font-size: 32px;
    }

    .header p {
      margin: 0;
      opacity: 0.96;
      line-height: 1.5;
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    button.secondary {
      background: #eef2f6;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .metric-card span {
      display: block;
      font-size: 13px;
      color: #5d6a73;
      margin-bottom: 6px;
    }

    .metric-card strong {
      font-size: 30px;
      color: var(--primary);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .panel h3 {
      margin: 0 0 14px 0;
      color: var(--primary);
      font-size: 22px;
    }

    #mapa {
      width: 100%;
      height: 460px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .kpis {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.35;
    }

    .mensaje-box {
      border: 1px solid var(--border);
      background: #eef6fb;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .bar-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bar-item {
      display: grid;
      grid-template-columns: 190px 1fr 70px;
      gap: 10px;
      align-items: center;
    }

    .bar-track {
      width: 100%;
      height: 12px;
      background: #ecf1f5;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1f4e78, #5f97c0);
      border-radius: 999px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 12px 10px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #f0f4f8;
      color: var(--primary);
      font-weight: 700;
    }

    td:first-child, th:first-child {
      text-align: left;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
    }

    .tag-alto {
      background: #dff0d8;
      color: #155724;
    }

    .tag-medio {
      background: #fff3cd;
      color: #856404;
    }

    .tag-bajo {
      background: #f8d7da;
      color: #721c24;
    }

    .error {
      color: #b00020;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .metrics { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: 1fr; }
      .bar-item { grid-template-columns: 1fr; }
      #mapa { height: 340px; }
    }

    @media (max-width: 640px) {
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Prioriza Territorio</h1>
      <p>Dashboard de priorización territorial para inversiones en riego</p>
    </div>

    <div class="actions">
      <button onclick="cargarDashboard()">Cargar dashboard</button>
      <button class="secondary" onclick="window.location.reload()">Actualizar</button>
    </div>

    <div class="status">
      <span id="estado">Aún no se han cargado datos.</span>
    </div>

    <div class="metrics" id="metricas"></div>

    <div class="grid">
      <div class="panel">
        <h3>Mapa de sitios</h3>
        <div id="mapa"></div>
      </div>

      <div class="panel">
        <h3>Resumen ejecutivo</h3>
        <div class="kpis" id="resumenEjecutivo"></div>
        <div id="mensajeEstrategico"></div>
        <h3 style="margin-top:18px;">Promedio por sitio</h3>
        <div class="bar-list" id="barrasSitios"></div>
      </div>
    </div>
<div class="card">
  <h3>Recomendación estratégica</h3>
  <p id="recomendacion" style="margin-top:8px; line-height:1.4;"></p>
</div>
    <div class="panel" style="margin-bottom:18px;">
      <h3>Puntajes por criterio</h3>
      <div class="bar-list" id="barrasCriterios"></div>
    </div>

    <div class="panel">
      <h3>Ranking territorial</h3>
      <div id="tablaWrap"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API = "/api/resultados";
    let mapa = null;
    let capaMarcadores = null;

    function clasificar(promedio) {
      if (promedio >= 4) return "Alto";
      if (promedio >= 3) return "Medio";
      return "Bajo";
    }

    function calcularViabilidad(r) {
      return (
        (Number(r.accesibilidad || 0) +
         Number(r.infraestructura || 0) +
         Number(r.servicios || 0)) / 3
      );
    }

    function claseNivel(nivel) {
      const n = String(nivel || "").toLowerCase();
      if (n === "alto") return "tag tag-alto";
      if (n === "medio") return "tag tag-medio";
      return "tag tag-bajo";
    }

    function colorNivel(nivel) {
      const n = String(nivel || "").toLowerCase();
      if (n === "alto") return "#2ecc71";
      if (n === "medio") return "#f1c40f";
      return "#e74c3c";
    }

    function initMapa() {
      if (mapa) return;
      mapa = L.map("mapa").setView([14.92, -91.40], 10);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(mapa);
      capaMarcadores = L.layerGroup().addTo(mapa);
    }

    function renderMapa(registros) {
      initMapa();
      capaMarcadores.clearLayers();
      const bounds = [];

      registros.forEach(r => {
        if (typeof r.lat === "number" && typeof r.lon === "number" && !Number.isNaN(r.lat) && !Number.isNaN(r.lon)) {
          const marker = L.circleMarker([r.lat, r.lon], {
            radius: 9,
            color: colorNivel(r.nivel),
            fillColor: colorNivel(r.nivel),
            fillOpacity: 0.9,
            weight: 2
          }).bindPopup(`
            <strong>${r.sitio}</strong><br>
            Fecha: ${r.fecha || ""}<br>
            Tipo: ${r.tipo_atractivo || ""}<br>
            Comunidad: ${r.comunidad || ""}<br>
            Promedio: ${Number(r.promedio || 0).toFixed(2)}<br>
            Nivel: ${r.nivel || ""}
          `);
          marker.addTo(capaMarcadores);
          bounds.push([r.lat, r.lon]);
        }
      });

      if (bounds.length) {
        mapa.fitBounds(bounds, { padding: [30, 30] });
      }

      setTimeout(() => mapa.invalidateSize(), 200);
    }

    function renderMetricas(registros) {
      const altos = registros.filter(r => (r.nivel || "").toLowerCase() === "alto").length;
      const medios = registros.filter(r => (r.nivel || "").toLowerCase() === "medio").length;

      const promedioGeneral = registros.length
        ? (registros.reduce((acc, r) => acc + Number(r.promedio || 0), 0) / registros.length).toFixed(2)
        : "0.00";

      document.getElementById("metricas").innerHTML = `
        <div class="metric-card"><span>Total de sitios</span><strong>${registros.length}</strong></div>
        <div class="metric-card"><span>Prioridad alta</span><strong>${altos}</strong></div>
        <div class="metric-card"><span>Prioridad media</span><strong>${medios}</strong></div>
        <div class="metric-card"><span>Promedio general</span><strong>${promedioGeneral}</strong></div>
      `;
    }

    function renderResumen(registros) {
      const mejor = registros[0]?.sitio || "-";
      const peor = registros[registros.length - 1]?.sitio || "-";

      const viabilidadProm = registros.length
        ? (
            registros.reduce((acc, r) => acc + calcularViabilidad(r), 0) /
            registros.length
          ).toFixed(2)
        : "0.00";

      document.getElementById("resumenEjecutivo").innerHTML = `
        <div class="pill">Mejor evaluado: <strong>${mejor}</strong></div>
        <div class="pill">Menor puntaje: <strong>${peor}</strong></div>
        <div class="pill">Índice de viabilidad: <strong>${viabilidadProm}</strong></div>
        <div class="pill">Registros cargados: <strong>${registros.length}</strong></div>
      `;
    }

    function generarMensaje(registros) {
      const promedio = registros.length
        ? registros.reduce((acc, r) => acc + Number(r.promedio || 0), 0) / registros.length
        : 0;

      let mensaje = "";

      if (promedio >= 4) {
        mensaje = "Alta prioridad territorial. Condiciones favorables para inversión inmediata.";
      } else if (promedio >= 3) {
        mensaje = "Prioridad media. Se recomienda fortalecer infraestructura, servicios y condiciones de implementación territorial.";
      } else {
        mensaje = "Prioridad baja. Se requieren intervenciones estructurales previas antes de una inversión mayor.";
      }

      document.getElementById("mensajeEstrategico").innerHTML = `
        <div class="mensaje-box">
          <strong>Conclusión automática:</strong> ${mensaje}
        </div>
      `;
    }

    function renderBarrasSitios(registros) {
      const html = registros.map(r => {
        const promedio = Number(r.promedio || 0);
        const width = Math.max(8, (promedio / 5) * 100);
        return `
          <div class="bar-item">
            <div>${r.sitio}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
            <div><strong>${promedio.toFixed(2)}</strong></div>
          </div>
        `;
      }).join("");

      document.getElementById("barrasSitios").innerHTML = html || "<div>Sin datos.</div>";
    }

    function renderBarrasCriterios(registros) {
      const criterios = [
        ["Atractivo", "atractivo"],
        ["Accesibilidad", "accesibilidad"],
        ["Infraestructura", "infraestructura"],
        ["Servicios", "servicios"],
        ["Sostenibilidad", "sostenibilidad"]
      ];

      const html = criterios.map(([label, key]) => {
        const valores = registros
          .map(r => Number(r[key] || 0))
          .filter(v => !Number.isNaN(v) && v > 0);

        const promedio = valores.length
          ? valores.reduce((a, b) => a + b, 0) / valores.length
          : 0;

        const width = Math.max(8, (promedio / 5) * 100);

        return `
          <div class="bar-item">
            <div>${label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
            <div><strong>${promedio.toFixed(2)}</strong></div>
          </div>
        `;
      }).join("");

      document.getElementById("barrasCriterios").innerHTML = html;
    }

    function renderTabla(registros) {
      const rows = registros.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${r.sitio || ""}</td>
          <td>${r.fecha || ""}</td>
          <td>${r.tipo_atractivo || ""}</td>
          <td>${r.comunidad || ""}</td>
          <td>${Number(r.promedio || 0).toFixed(2)}</td>
          <td><span class="${claseNivel(r.nivel)}">${r.nivel || ""}</span></td>
        </tr>
      `).join("");

      document.getElementById("tablaWrap").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Sitio</th>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Comunidad</th>
              <th>Promedio</th>
              <th>Nivel</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function cargarDashboard() {
      const estado = document.getElementById("estado");
      estado.textContent = "Cargando datos desde D1...";

      try {
        const res = await fetch(API, { cache: "no-store" });
        if (!res.ok) throw new Error("No se pudo leer la API");

        const data = await res.json();

        const registros = data
          .map(r => {
            const promedio = Number(r.promedio || 0);
            return {
              ...r,
              promedio,
              nivel: clasificar(promedio),
              lat: r.lat !== null ? Number(r.lat) : null,
              lon: r.lon !== null ? Number(r.lon) : null,
              atractivo: Number(r.atractivo || 0),
              accesibilidad: Number(r.accesibilidad || 0),
              infraestructura: Number(r.infraestructura || 0),
              servicios: Number(r.servicios || 0),
              sostenibilidad: Number(r.sostenibilidad || 0)
            };
          })
          .sort((a, b) => b.promedio - a.promedio);

        renderMetricas(registros);
        renderResumen(registros);
        generarMensaje(registros);
        renderBarrasSitios(registros);
        renderBarrasCriterios(registros);
        renderTabla(registros);
        renderMapa(registros);
const ordenados = [...data].sort((a, b) => b.promedio - a.promedio);

const mejor = ordenados[0];
const peor = ordenados[ordenados.length - 1];

const recomendacionTexto = 
  `Se recomienda priorizar intervenciones en ${mejor.sitio}, 
  que presenta el mayor potencial (${mejor.promedio}). 
  Asimismo, ${peor.sitio} requiere mejoras en infraestructura y servicios 
  para elevar su viabilidad territorial.`;
        
        estado.textContent = `Se cargaron ${registros.length} registros desde la base de datos.`;
      } catch (error) {
        console.error(error);
        estado.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    }

// insertar en HTML
const rec = document.getElementById("recomendacion");
if (rec) rec.innerText = recomendacionTexto;
    cargarDashboard();
  </script>
</body>
</html>
